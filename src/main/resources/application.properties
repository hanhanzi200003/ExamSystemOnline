spring.application.name=exam-system

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://192.168.80.102:3306/exam_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=exam_user
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - 50-1000
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== JWT =====
jwt.secret=mySecretKeyForExamSystem32Chars12
jwt.student.expiration=604800000
jwt.teacher.expiration=2592000000

# ===== Redis =====
spring.data.redis.host=192.168.80.102
spring.data.redis.port=6379
spring.data.redis.password=hanhanzi
spring.data.redis.timeout=3000ms
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-wait=3000ms
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10

# ===== Tomcat =====
server.tomcat.max-threads=200
server.tomcat.accept-count=100
server.tomcat.max-connections=1000
server.tomcat.min-spare-threads=20

# ===== Async Task =====
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=200
spring.task.execution.pool.keep-alive=60s

# ===== JSON =====
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Log =====
logging.level.root=INFO
logging.level.com.example.exam_system.examscore.service.ExamScoreService=DEBUG
logging.level.com.example.exam_system.examscore=DEBUG

spring.application.name=exam-system

# MySQL ??
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP - 50-1000
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== JWT =====
jwt.secret=mySecretKeyForExamSystem32Chars12
jwt.student.expiration=604800000
jwt.teacher.expiration=2592000000

# Redis ??
spring.redis.host=${REDISHOST}
spring.redis.port=${REDISPORT}
spring.redis.password=${REDISPASSWORD}
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# ===== Tomcat =====
server.tomcat.max-threads=200
server.tomcat.accept-count=100
server.tomcat.max-connections=1000
server.tomcat.min-spare-threads=20

# ===== Async Task =====
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=200
spring.task.execution.pool.keep-alive=60s

# ===== JSON =====
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Log =====
logging.level.root=INFO
logging.level.com.example.exam_system.examscore.service.ExamScoreService=DEBUG
logging.level.com.example.exam_system.examscore=DEBUG


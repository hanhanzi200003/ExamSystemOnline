spring.application.name=exam-system

# ===== MySQL =====
spring.datasource.url=${DB_URL:jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HikariCP =====
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== JWT =====
jwt.secret=${JWT_SECRET:}
jwt.student.expiration=604800000
jwt.teacher.expiration=2592000000

# ===== Redis =====
spring.data.redis.url=${REDIS_URL:}

# ===== Server =====
server.port=${PORT:8080}

# ===== Log =====
logging.level.root=INFO
logging.level.com.example.exam_system=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.hibernate.SQL=DEBUG
